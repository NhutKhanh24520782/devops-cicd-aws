apiVersion: v1
kind: Namespace
metadata:
  name: devops-project
---
# apiVersion: v1
# kind: PersistentVolumeClaim
# metadata:
#   name: mongodb-pvc
#   namespace: devops-project
# spec:
#   accessModes:
#     - ReadWriteOnce
#   resources:
#     requests:
#       storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: devops-project

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:
      containers:
      - name: mongodb
        image: mongo:7

        ports:
        - containerPort: 27017

        env:
        - name: MONGO_INITDB_DATABASE
          value: devops

        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db

      volumes:
      - name: mongodb-storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: devops-project
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: 274118253913.dkr.ecr.ap-southeast-1.amazonaws.com/devops-project-dev-backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        env:
        - name: MONGO_URI
          value: mongodb://mongodb:27017/devops

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: devops-project

spec:
  selector:
    app: backend

  ports:
  - port: 8080
    targetPort: 8080

  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devops-project

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: 274118253913.dkr.ecr.ap-southeast-1.amazonaws.com/devops-project-dev-frontend:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: devops-project

spec:
  selector:
    app: frontend

  ports:
  - port: 80
    targetPort: 80

  type: ClusterIP
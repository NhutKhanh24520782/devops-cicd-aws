# Placeholder Deployment manifest
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: devops-portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: app
          image: placeholder-image:latest
          ports:
            - containerPort: 8080
